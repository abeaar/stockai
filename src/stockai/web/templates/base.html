<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockAI{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly for charts -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- Custom styles -->
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-2xl">📊</span>
                    <span class="font-bold text-xl">StockAI</span>
                </a>
                <div class="flex space-x-6">
                    <a href="/stocks" class="hover:text-blue-200 transition">Stocks</a>
                    <a href="/portfolio" class="hover:text-blue-200 transition">Portfolio</a>
                    <a href="/sentiment" class="hover:text-blue-200 transition">Sentiment</a>
                    <a href="/api/docs" class="hover:text-blue-200 transition" target="_blank">API</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>StockAI Dashboard v{{ version | default('0.1.0') }}</p>
            <p class="text-sm text-gray-500 mt-1">AI-Powered Indonesian Stock Analysis</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
